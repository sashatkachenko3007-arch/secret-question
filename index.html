<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>У меня есть к тебе вопрос... ✨</title>
    <!-- Подключаем стандартную библиотеку для конфетти -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* БОКЕ-ФОН С ПЛАВНЫМ ПЕРЕЛИВОМ */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #ffd1ff, #a1c4fd);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.85);
            padding: 50px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 450px;
            position: relative;
            z-index: 10;
        }

        h1 { color: #d32f2f; font-size: 28px; margin-bottom: 30px; line-height: 1.4; }
        .emoji { font-size: 40px; }

        .buttons-step-1 { 
            display: flex; 
            justify-content: center; 
            align-items: center;
            gap: 40px; 
            margin-top: 30px; 
            height: 80px;
            position: relative;
        }

        button {
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }

        #yesBtn { 
            background-color: #4caf50; 
            color: white; 
            z-index: 12;
            position: relative;
        }
        #yesBtn:hover { transform: scale(1.05); }

        #noBtn { 
            background-color: #f44336; 
            color: white; 
            position: absolute; 
            z-index: 20; 
            transition: left 0.15s ease-out, top 0.15s ease-out;
        }

        .step-2, .step-3, .final-step { display: none; margin-top: 20px; text-align: left; }
        .step-2 h2, .step-3 h2 { font-size: 22px; color: #333; margin-bottom: 15px; text-align: center; }
        .select-wrapper { margin-bottom: 20px; }
        label { display: block; font-weight: bold; color: #555; margin-bottom: 8px; }
        
        select, input[type="date"], input[type="time"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #fad0c4;
            border-radius: 10px;
            background-color: white;
            box-sizing: border-box;
        }

        #submitBtn {
            background-color: #f06292;
            color: white;
            width: 100%;
            margin-top: 20px;
        }

        /* СТИЛИ ДЛЯ ВЫЛЕТАЮЩИХ ЭМОДЗИ */
        .burst-emoji {
            position: absolute;
            font-size: 35px;
            pointer-events: none;
            z-index: 100;
            animation: flyUp 1s ease-out forwards;
        }

        @keyframes flyUp {
            0% {
                transform: translate(0, 0) scale(0.5);
                opacity: 1;
            }
            100% {
                transform: translate(var(--mx), var(--my)) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ЭТАП 1: ГЛАВНЫЙ ВОПРОС -->
        <div class="step-1" id="step1">
            <h1>Анит, персик мой пойдешь со мной на свидание?<br>☕ ✨</h1>
            <div class="buttons-step-1" id="orbitArea">
                <button id="yesBtn" onclick="celebrateAndNext(event)">Да!</button>
                <button id="noBtn">Нет</button>
            </div>
        </div>

        <!-- ЭТАП 2: КУДА ПОЙДЕМ? -->
        <div class="step-2" id="step2">
            <h2>Отлично! 🎉 А куда бы ты хотела?<br><span class="emoji">🍕🥤🎟️</span></h2>
            <div class="select-wrapper">
                <label for="place">Выберите место:</label>
                <select id="place" required>
                    <option value="" disabled selected>— Сделай выбор —</option>
                    <option value="Кофе">Просто кофе </option>
                    <option value="Уютный ужин">Уютный ужин</option>
                    <option value="Поход в кино">Поход в кино</option>
                    <option value="Прогулка в парке">Прогулка в парке</option>
                     <option value="Прогулка на лошадках">Прогулка на лошадках</option>
                    <option value="Картинг">Картинг</option>
                    <option value="Лишь бы увидеться">Лишь бы увидеться</option>
                    <option value="Наше место">Наше место</option>
                    <option value="Горки">Горки</option>
                    <option value="Экстремальный отдых">Экстремальный отдых</option>
                    <option value="Другое (обсудим)">Другое (давай обсудим)</option>
                </select>
            </div>
            <button id="submitBtn" onclick="nextStep(3)">Далее</button>
        </div>

        <!-- ЭТАП 3: В КАКОЕ ВРЕМЯ? -->
        <div class="step-3" id="step3">
            <h2>Супер выбор! 🤩<br>А в какое время тебе удобно?</h2>
            <div class="select-wrapper">
                <label for="date">Выберите день:</label>
                <input type="date" id="date" required>
            </div>
            <div class="select-wrapper">
                <label for="time">Выберите время:</label>
                <input type="time" id="time" required>
            </div>
            <button id="submitBtn" onclick="finalSubmit()">Готово!</button>
        </div>

        <!-- ФИНАЛ: СПАСИБО -->
        <div class="final-step" id="finalStep">
            <h1 style="text-align: center;">Ура! ❤️ 🎉</h1>
            <p style="font-size: 18px; color: #555; text-align: center;">Я всё получил. Давай я всё организую и напишу тебе в мессенджер!</p>
        </div>

    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');

        setTimeout(resetNoButtonPosition, 100);

        function resetNoButtonPosition() {
            if(yesBtn && noBtn) {
                noBtn.style.left = (yesBtn.offsetLeft + yesBtn.offsetWidth + 20) + 'px';
                noBtn.style.top = yesBtn.offsetTop + 'px';
            }
        }

        noBtn.addEventListener('mouseover', moveButtonAroundYes);
        noBtn.addEventListener('click', moveButtonAroundYes);

        function moveButtonAroundYes() {
            const yesCenterX = yesBtn.offsetLeft + (yesBtn.offsetWidth / 2);
            const yesCenterY = yesBtn.offsetTop + (yesBtn.offsetHeight / 2);
            const radius = 110; 
            const randomAngle = Math.random() * Math.PI * 2;

            const newX = yesCenterX + radius * Math.cos(randomAngle) - (noBtn.offsetWidth / 2);
            const newY = yesCenterY + radius * Math.sin(randomAngle) - (noBtn.offsetHeight / 2);

            noBtn.style.left = newX + 'px';
            noBtn.style.top = newY + 'px';
        }

        window.addEventListener('resize', resetNoButtonPosition);

        // ФУНКЦИЯ НАСТОЯЩЕГО ВЗРЫВА 3 КОНКРЕТНЫХ ЭМОДЗИ
        function celebrateAndNext(event) {
            // 1. Запуск классического цветного конфетти (работает всегда)
            if (typeof confetti === 'function') {
                confetti({ particleCount: 50, spread: 60, origin: { y: 0.6 } });
            }

            // 2. Создаем взрыв из 3 конкретных эмодзи прямо из точки клика
            const emojis = ['❤️', '💋', '✨'];
            const clickX = event.clientX;
            const clickY = event.clientY;

            for (let i = 0; i < 24; i++) {
                const el = document.createElement('div');
                el.className = 'burst-emoji';
                // Выбираем один из трех эмодзи по очереди
                el.innerText = emojis[i % emojis.length]; 
                
                el.style.left = clickX + 'px';
                el.style.top = clickY + 'px';

                // Задаем случайное направление разлета
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 150;
                const mx = Math.cos(angle) * distance;
                const my = Math.sin(angle) * distance - 50; // Чуть больше вверх

                el.style.setProperty('--mx', mx + 'px');
                el.style.setProperty('--my', my + 'px');

                document.body.appendChild(el);

                // Удаляем элемент после завершения анимации
                setTimeout(() => el.remove(), 1000);
            }
            
            // Переходим на следующий шаг
            setTimeout(() => {
                nextStep(2);
            }, 900);
        }

        function nextStep(step) {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';

            if (step === 2) {
                document.getElementById('step2').style.display = 'block';
            } else if (step === 3) {
                document.getElementById('step3').style.display = 'block';
            }
        }

        function finalSubmit() {
            const place = document.getElementById('place').value;
            const date = document.getElementById('date').value;
            const time = document.getElementById('time').value;

            const finalMessage = `Она согласилась на свидание! \nМесто: ${place} \nДата: ${date} \nВремя: ${time}`;

            document.getElementById('step3').style.display = 'none';
            document.getElementById('finalStep').style.display = 'block';

            if (typeof confetti === 'function') {
                confetti({ particleCount: 100, spread: 80, origin: { y: 0.6 } });
            }

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    access_key: 'e6bea270-2721-4f59-ac39-f41ff9e75bc5', // <-- ВСТАВЬТЕ СВОЙ КЛЮЧ СЮДА
                    subject: '❤️ Детали свидания!',
                    message: finalMessage
                })
            });
        }
    </script>
</body>
</html>
